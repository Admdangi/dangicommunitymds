<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #1a252f; }
        .btn-secondary { background-color: #3498db; }
        .btn-secondary:hover { background-color: #2980b9; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 0.9rem; color: #3498db; cursor: pointer; }
        .hidden { display: none; }
        .otp-section { border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px; }
        #messageBox { text-align: center; margin-top: 10px; font-size: 0.9rem; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="container">
    <div id="messageBox"></div>

    <div id="loginForm">
        <h2>System Login</h2>
        <div class="form-group">
            <label>Email ID or Mobile Number</label>
            <input type="text" id="loginId">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword">
        </div>
        <button onclick="handleLogin()">Login</button>
        <div class="toggle-link" onclick="toggleForms()">Need an account? Register here</div>
    </div>

    <div id="registerForm" class="hidden">
        <h2>Register</h2>
        <div class="form-group">
            <label>Gmail ID</label>
            <input type="email" id="regEmail">
        </div>
        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="regMobile">
        </div>
        
        <button type="button" class="btn-secondary" id="sendOtpBtn" onclick="requestOTP()">Send OTP</button>

        <div id="otpVerificationSection" class="hidden otp-section">
            <div class="form-group">
                <label>Enter 6-Digit OTP</label>
                <input type="text" id="regOtp">
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="regPassword">
            </div>
            <button onclick="submitRegistration()">Verify & Register</button>
        </div>
        <div class="toggle-link" onclick="toggleForms()">Already registered? Login here</div>
    </div>
</div>

<script>
    // Utility to show messages on screen
    function showMessage(msg, isSuccess) {
        const msgBox = document.getElementById('messageBox');
        msgBox.textContent = msg;
        msgBox.className = isSuccess ? 'success' : 'error';
        setTimeout(() => msgBox.textContent = '', 5000);
    }

    // Toggle between forms
    function toggleForms() {
        document.getElementById('loginForm').classList.toggle('hidden');
        document.getElementById('registerForm').classList.toggle('hidden');
        document.getElementById('messageBox').textContent = '';
    }

    // Step 1: Request OTP and show it in an alert
    async function requestOTP() {
        const email = document.getElementById('regEmail').value;
        const mobile = document.getElementById('regMobile').value;

        if(!email || !mobile) return showMessage("Enter Email and Mobile.", false);

        const response = await fetch('api/send_otp.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, mobile })
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            // 🚨 THIS IS THE REAL-TIME ALERT YOU REQUESTED 🚨
            alert("LOCAL TESTING MODE\nYour OTP is: " + result.test_otp);

            showMessage("OTP alert triggered successfully.", true);
            
            // Show the next step
            document.getElementById('otpVerificationSection').classList.remove('hidden');
            document.getElementById('sendOtpBtn').classList.add('hidden');
            
            // Lock inputs so they can't change email/phone after getting the OTP
            document.getElementById('regEmail').disabled = true;
            document.getElementById('regMobile').disabled = true;
        } else {
            showMessage(result.message, false);
        }
    }

    // Step 2: Submit the exact OTP from the alert
    async function submitRegistration() {
        const email = document.getElementById('regEmail').value;
        const mobile = document.getElementById('regMobile').value;
        const otp = document.getElementById('regOtp').value;
        const password = document.getElementById('regPassword').value;

        if(!otp || !password) return showMessage("Enter OTP and Password.", false);

        const response = await fetch('api/register.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, mobile, otp, password })
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            showMessage(result.message, true);
            setTimeout(toggleForms, 2000); // Switch to login screen after 2 seconds
        } else {
            showMessage(result.message, false);
        }
    }

    // Step 3: Login
    async function handleLogin() {
        const loginId = document.getElementById('loginId').value;
        const password = document.getElementById('loginPassword').value;

        if(!loginId || !password) return showMessage("Enter ID and Password.", false);

        const response = await fetch('api/login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginId, password })
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            showMessage(result.message, true);
            // Redirect to your dashboard
            // window.location.href = 'dashboard.php';
        } else {
            showMessage(result.message, false);
        }
    }
</script>

</body>
</html>
