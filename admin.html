<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <style>
        body { font-family: sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 8px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; }
        #msg { color: red; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Access</h2>
        <input type="text" id="adminUser" placeholder="Username">
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="adminLogin()">Access Panel</button>
        <div id="msg"></div>
        <div style="margin-top: 15px;"><a href="index.html" style="font-size: 12px; color: #666;">Return to User Portal</a></div>
    </div>

    <script>
        async function adminLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            
            const response = await fetch('api/admin_login.php', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            const result = await response.json();
            
            if (result.status === 'success') {
                window.location.href = 'admin_dashboard.php';
            } else {
                document.getElementById('msg').innerText = result.message;
            }
        }
    </script>
</body>
</html>
